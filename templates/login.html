<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hospital Doctor Login</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body { background: linear-gradient(180deg,#f7fbff 0%, #ffffff 100%); }
    .auth-card { max-width: 900px; margin: 48px auto; box-shadow: 0 6px 24px rgba(0,0,0,0.08); border-radius: 12px; overflow: hidden; }
    .brand-side { background: linear-gradient(135deg,#0d6efd 0%, #20c997 100%); color: white; padding: 32px; }
    .brand-side img { max-width: 120px; }
    .brand-title { font-weight:700; font-size:1.6rem; margin-top:12px }
    .brand-sub { opacity:0.95; margin-top:8px }
    .form-side { padding: 32px; background: #fff; }
    .small-muted { color: #6c757d; font-size:0.9rem }
  </style>
</head>
<body>
  <div class="auth-card d-flex">
    <div class="brand-side d-flex flex-column justify-content-center align-items-start col-md-5">
      <img src="{{ url_for('static', filename='logo1.png') }}" alt="Hospital Logo">
      <div class="brand-title">Cardiac Care Hospital</div>
      <div class="brand-sub">Secure doctor access — review patient ECG reports and diagnostics</div>
    </div>
    <div class="form-side col-md-7">
      <h4>Doctor Login</h4>
      {% if message %}<div class="alert alert-info">{{ message }}</div>{% endif %}
      <p class="small-muted">Enter your hospital email to receive a secure login code.</p>
      <form method="post" action="{{ url_for('login') }}" class="mb-3">
        <div class="form-group">
          <label class="small">Email address</label>
          <input class="form-control" type="email" name="email" placeholder="you@hospital.org" required>
        </div>
        <button class="btn btn-primary btn-block">Send Login Code</button>
      </form>

      {% if show_verify %}
      <hr>
      <h6>Enter verification code</h6>
      <form method="post" action="{{ url_for('login_verify') }}">
        <div class="form-row">
          <div class="form-group col-8">
            <input class="form-control" name="code" placeholder="6-digit code" required>
          </div>
          <div class="form-group col-4">
            <button class="btn btn-success btn-block">Verify & Login</button>
          </div>
        </div>
      </form>
      {% endif %}

      <div class="mt-3 small-muted">No account? <a href="{{ url_for('signup') }}">Create doctor account</a></div>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hospital Doctor Sign Up</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body { background: linear-gradient(180deg,#f3f8ff 0%, #ffffff 100%); }
    .auth-card { max-width: 920px; margin: 48px auto; box-shadow: 0 6px 24px rgba(0,0,0,0.08); border-radius: 12px; overflow: hidden; }
    .brand-side { background: linear-gradient(135deg,#0d6efd 0%, #20c997 100%); color: white; padding: 28px; }
    .brand-side img { max-width: 110px; }
    .brand-title { font-weight:700; font-size:1.5rem; margin-top:10px }
    .form-side { padding: 28px; background: #fff; }
    .small-muted { color: #6c757d; font-size:0.9rem }
  </style>
</head>
<body>
  <div class="auth-card d-flex">
    <div class="brand-side d-flex flex-column justify-content-center align-items-start col-md-5">
      <img src="{{ url_for('static', filename='logo1.png') }}" alt="Hospital Logo">
      <div class="brand-title">Cardiac Care Hospital</div>
      <div class="mt-2">Create a secure doctor account to access patient ECG reports and analytics.</div>
    </div>
    <div class="form-side col-md-7">
      <h4>Doctor Sign Up</h4>
      {% if message %}<div class="alert alert-info">{{ message }}</div>{% endif %}
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}

      <form method="post" action="{{ url_for('signup') }}" class="mb-3">
        <div class="form-row">
          <div class="form-group col-md-6">
            <label class="small">Full name</label>
            <input class="form-control" name="name" placeholder="Dr. Jane Doe" required>
          </div>
          <div class="form-group col-md-6">
            <label class="small">Hospital email</label>
            <input class="form-control" type="email" name="email" placeholder="you@hospital.org" required>
          </div>
        </div>
        <button class="btn btn-primary btn-block">Send Verification Code</button>
      </form>

      {% if show_verify %}
      <hr>
      <h6>Enter verification code</h6>
      <form method="post" action="{{ url_for('signup_verify') }}">
        <div class="form-row align-items-center">
          <div class="form-group col-8">
            <input class="form-control" name="code" placeholder="6-digit code" required>
          </div>
          <div class="form-group col-4">
            <button class="btn btn-success btn-block">Verify & Create Account</button>
          </div>
        </div>
      </form>
      {% endif %}

      <div class="mt-3 small-muted">Already have an account? <a href="{{ url_for('login') }}">Login</a></div>
    </div>
  </div>
</body>
</html>
